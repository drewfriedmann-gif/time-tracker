<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Breakdown Dashboard</title>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0d0d1a,#0a0a18,#0f0a1e);color:#e8e8f0;font-family:system-ui,sans-serif;padding:24px 20px}
.glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:20px}
h1{font-size:24px;font-weight:700;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{border:none;border-radius:10px;padding:9px 18px;font-weight:600;cursor:pointer;font-size:13px}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff}
.btn-gcal{background:linear-gradient(135deg,#0B8043,#039BE5);color:#fff}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#aaa}
.btn-nav{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;width:32px;height:32px;color:#fff;cursor:pointer;font-size:16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.date-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:24px}
.tab-group{display:flex;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.tab{padding:7px 16px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#888}
.tab.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:14px 16px;position:relative;transition:box-shadow 0.2s}
.card:hover{box-shadow:0 0 0 1px var(--cat-hex,#7c3aed)66,0 4px 20px rgba(0,0,0,0.5)}
.card-add{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;opacity:0.4;min-height:100px;transition:opacity 0.2s}
.card-add:hover{opacity:1}
.charts-grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;margin-bottom:24px}
.popover{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);z-index:1000;width:240px;background:#1c1035;border-radius:12px;padding:12px 14px;box-shadow:0 16px 48px rgba(0,0,0,0.9);pointer-events:none;display:none}
.popover::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:#1c1035}
.card:hover .popover{display:block}
.ev-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px}
.ev-name{font-size:12px;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-hrs{font-size:12px;font-weight:700;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:8px 12px;color:#666;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid rgba(255,255,255,0.08)}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
input[type=date]{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 10px;color:#e8e8f0;font-size:13px;color-scheme:dark}
.swatch{width:18px;height:18px;border-radius:5px;display:inline-block;cursor:pointer;border:2px solid rgba(255,255,255,0.25);vertical-align:middle;flex-shrink:0}
.picker-panel{position:absolute;top:52px;left:16px;z-index:300;background:#12121f;border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;width:170px;box-shadow:0 8px 32px rgba(0,0,0,0.8)}
.picker-sw{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.picker-sw.sel{border-color:#fff}
.bar-chip{height:6px;border-radius:3px;background:rgba(255,255,255,0.08)}
.bar-fill{height:100%;border-radius:3px}
.range-label{font-size:14px;font-weight:500;color:#c4b5fd;min-width:200px;text-align:center}
#sign-in-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:20px;text-align:center}
@media(max-width:640px){.charts-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Sign-in screen -->
<div id="sign-in-screen">
  <h1 style="font-size:28px">Work Breakdown Dashboard</h1>
  <p style="color:#888;font-size:15px;max-width:380px">Connect your Google Calendar to see how you spend your time, broken down by color-coded categories.</p>
  <button class="btn btn-gcal" id="sign-in-btn" style="font-size:15px;padding:12px 28px">📅 Sign in with Google Calendar</button>
  <p style="color:#555;font-size:12px">Read-only access · Your data never leaves your browser</p>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="header">
    <div>
      <h1>Work Breakdown</h1>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
        <span class="status-dot" id="status-dot" style="background:#F6BF26"></span>
        <p style="color:#888;font-size:13px" id="status-text">Ready</p>
      </div>
    </div>
    <div class="header-btns">
      <button class="btn btn-gcal" id="load-btn">📅 Load Calendar</button>
      <button class="btn btn-primary" id="refresh-btn">↻ Refresh</button>
      <button class="btn btn-ghost" id="sign-out-btn">Sign out</button>
    </div>
  </div>

  <div id="error-banner" style="display:none;margin-bottom:16px;padding:12px 16px;border-radius:12px;border-left:3px solid #ef4444;background:rgba(239,68,68,0.08)">
    <p style="color:#fca5a5;font-size:13px" id="error-text"></p>
  </div>
  <div id="warn-banner" style="display:none;margin-bottom:16px;padding:12px 16px;border-radius:12px;border-left:3px solid #F6BF26;background:rgba(246,191,38,0.06)">
    <p style="color:#fde68a;font-size:13px" id="warn-text"></p>
  </div>

  <!-- Date controls -->
  <div class="glass date-bar" style="padding:16px 20px">
    <div class="tab-group">
      <button class="tab active" id="tab-week" onclick="setMode('week')">By Week</button>
      <button class="tab" id="tab-custom" onclick="setMode('custom')">Custom Range</button>
    </div>
    <div id="week-nav" style="display:flex;align-items:center;gap:10px">
      <button class="btn-nav" onclick="shiftWeek(-1)">‹</button>
      <span class="range-label" id="range-label"></span>
      <button class="btn-nav" onclick="shiftWeek(1)">›</button>
      <button class="btn btn-ghost" id="today-btn" onclick="shiftWeek(0,true)" style="display:none;padding:5px 12px;font-size:12px">Today</button>
    </div>
    <div id="custom-nav" style="display:none;align-items:center;gap:10px;flex-wrap:wrap">
      <input type="date" id="cs">
      <span style="color:#666">→</span>
      <input type="date" id="ce">
      <span style="font-size:13px;color:#888" id="custom-label"></span>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cards-grid"></div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="glass">
      <h3 style="font-size:15px;font-weight:600;color:#c4b5fd;margin-bottom:16px">Distribution</h3>
      <canvas id="donut-chart" height="220"></canvas>
      <div id="legend" style="display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin-top:12px"></div>
    </div>
    <div class="glass">
      <h3 style="font-size:15px;font-weight:600;color:#c4b5fd;margin-bottom:16px">Daily Breakdown</h3>
      <canvas id="bar-chart" height="220"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="glass">
    <h3 style="font-size:15px;font-weight:600;color:#c4b5fd;margin-bottom:16px">Category Details</h3>
    <table>
      <thead><tr><th>Color</th><th>Category</th><th>Hours</th><th>% of Total</th><th>Daily Avg</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const CLIENT_ID = '573431041382-m757uotup5ck5nvgd7m9lqukc7c184uh.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';

// Google Calendar colorId → hex
const GCAL_COLORS = {
  '1':'#7986cb','2':'#33b679','3':'#8e24aa','4':'#e67c73',
  '5':'#f6bf26','6':'#f4511e','7':'#039be5','8':'#3f51b5',
  '9':'#0b8043','10':'#d50000','11':'#616161'
};

const ALL_COLORS = [
  {id:'tomato',hex:'#d50000'},{id:'flamingo',hex:'#e67c73'},
  {id:'tangerine',hex:'#f4511e'},{id:'banana',hex:'#f6bf26'},
  {id:'sage',hex:'#33b679'},{id:'basil',hex:'#0b8043'},
  {id:'peacock',hex:'#039be5'},{id:'blueberry',hex:'#3f51b5'},
  {id:'lavender',hex:'#7986cb'},{id:'grape',hex:'#8e24aa'},
  {id:'graphite',hex:'#616161'}
];

// ── State ──────────────────────────────────────────────
let tokenClient, accessToken = null;
let weekOffset = 0, mode = 'week';
let customStart = fmt(new Date(Date.now() - 6*864e5));
let customEnd   = fmt(new Date());
let rawEvents = [], catEvents = {}, barData = [];
let donutInst = null, barInst = null;
let categories = loadCats();

function loadCats() {
  try { const s=localStorage.getItem('wbd-cats'); if(s) return JSON.parse(s); } catch(e){}
  return ALL_COLORS.slice(0,5).map((c,i)=>({...c,active:true,label:['Deep Work','Meetings','Admin','Learning','Breaks'][i]}));
}
function saveCats(){ localStorage.setItem('wbd-cats',JSON.stringify(categories)); }

// ── Date helpers ───────────────────────────────────────
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseLocal(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function getDays(s,e){
  const days=[], cur=parseLocal(s), end=parseLocal(e);
  while(cur<=end){ days.push(fmt(cur)); cur.setDate(cur.getDate()+1); }
  return days;
}
function dispDay(ds){ return parseLocal(ds).toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'}); }
function getRange(){
  if(mode==='week'){ const n=new Date(),mon=new Date(n); mon.setDate(n.getDate()-((n.getDay()+6)%7)+weekOffset*7); mon.setHours(0,0,0,0); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return {s:fmt(mon),e:fmt(sun)}; }
  return {s:customStart,e:customEnd};
}
function rangeStr(){
  const {s,e}=getRange();
  return `${parseLocal(s).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${parseLocal(e).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
}

// ── Auth ───────────────────────────────────────────────
window.addEventListener('load',()=>{
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPE,
    callback: async resp => {
      if(resp.error){ showErr('Auth error: '+resp.error); return; }
      accessToken = resp.access_token;
      document.getElementById('sign-in-screen').style.display='none';
      document.getElementById('dashboard').style.display='block';
      renderAll();
      await loadCalendar();
    }
  });
  document.getElementById('sign-in-btn').onclick = ()=>tokenClient.requestAccessToken();
  document.getElementById('load-btn').onclick    = loadCalendar;
  document.getElementById('refresh-btn').onclick = loadCalendar;
  document.getElementById('sign-out-btn').onclick= signOut;
  document.getElementById('cs').value=customStart;
  document.getElementById('ce').value=customEnd;
  document.getElementById('cs').onchange=e=>{customStart=e.target.value;processAndRender();};
  document.getElementById('ce').onchange=e=>{customEnd=e.target.value;processAndRender();};
  updateNav(); renderAll();
});

function signOut(){
  if(accessToken) google.accounts.oauth2.revoke(accessToken,()=>{});
  accessToken=null; rawEvents=[];
  document.getElementById('sign-in-screen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
}

// ── Calendar fetch ─────────────────────────────────────
async function api(url){
  const r=await fetch(url,{headers:{Authorization:`Bearer ${accessToken}`}});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadCalendar(){
  if(!accessToken){ tokenClient.requestAccessToken(); return; }
  setStatus('loading'); hideErr(); hideWarn();
  try{
    const calList = await api('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=250');
    const {s,e} = getRange();
    const tMin=parseLocal(s).toISOString();
    const tMax=new Date(parseLocal(e).getTime()+864e5).toISOString();
    const all=[];
    await Promise.all(calList.items.map(async cal=>{
      try{
        const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&maxResults=500&orderBy=startTime`;
        const data=await api(url);
        (data.items||[]).forEach(ev=>{
          const self=(ev.attendees||[]).find(a=>a.self);
          if(self&&self.responseStatus==='declined') return;
          const colorHex=(ev.colorId?GCAL_COLORS[ev.colorId]:null)||cal.backgroundColor||'#616161';
          const hours=ev.start.date?8:+((new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/36e5).toFixed(2);
          const date=ev.start.date||ev.start.dateTime.split('T')[0];
          all.push({title:ev.summary||'(no title)',date,hours,colorHex:colorHex.toLowerCase()});
        });
      }catch(e){/* skip broken calendar */}
    }));
    rawEvents=all;
    processAndRender();
    setStatus('loaded');
  }catch(err){
    showErr('Failed to load calendar: '+err.message);
    setStatus('error');
  }
}

// ── Process events → chart data ────────────────────────
function processAndRender(){
  const {s,e}=getRange();
  if(parseLocal(s)>parseLocal(e)) return;
  const days=getDays(s,e);
  const disp=days.length>14?days.map((_,i)=>`Day ${i+1}`):days.map(dispDay);
  const d2disp={}; days.forEach((d,i)=>d2disp[d]=disp[i]);
  const ac=categories.filter(c=>c.active);
  const h2cat={}; ac.forEach(c=>h2cat[c.hex.toLowerCase()]=c);
  const bMap={}; disp.forEach(d=>{bMap[d]={day:d};ac.forEach(c=>{bMap[d][c.label]=0;});});
  const evMap={}; ac.forEach(c=>{evMap[c.label]={};});
  rawEvents.forEach(ev=>{
    const cat=h2cat[ev.colorHex]; if(!cat) return;
    const d=d2disp[ev.date]; if(!d) return;
    if(bMap[d]) bMap[d][cat.label]=+((bMap[d][cat.label]||0)+ev.hours).toFixed(2);
    evMap[cat.label][ev.title]=+((evMap[cat.label][ev.title]||0)+ev.hours).toFixed(2);
  });
  barData=Object.values(bMap);
  catEvents={}; ac.forEach(c=>{catEvents[c.label]=Object.entries(evMap[c.label]||{}).map(([n,h])=>({name:n,hours:+h.toFixed(1)})).sort((a,b)=>b.hours-a.hours);});
  // Unmatched colors
  if(rawEvents.length>0){
    const matched=new Set(ac.map(c=>c.hex.toLowerCase()));
    const um=[...new Set(rawEvents.map(e=>e.colorHex).filter(h=>!matched.has(h)))];
    um.length>0?showWarn(`${um.length} calendar color(s) aren't mapped to a category — those events are excluded. Add a category and assign the matching color.`):hideWarn();
  }
  renderAll();
}

// ── Render ─────────────────────────────────────────────
function renderAll(){ updateNav(); renderCards(); renderCharts(); renderTable(); }

function updateNav(){
  document.getElementById('range-label').textContent=rangeStr();
  document.getElementById('custom-label').textContent=rangeStr();
  document.getElementById('tab-week').className='tab'+(mode==='week'?' active':'');
  document.getElementById('tab-custom').className='tab'+(mode==='custom'?' active':'');
  document.getElementById('week-nav').style.display=mode==='week'?'flex':'none';
  document.getElementById('custom-nav').style.display=mode==='custom'?'flex':'none';
  document.getElementById('today-btn').style.display=(mode==='week'&&weekOffset!==0)?'inline-block':'none';
}

function totalsFor(ac){
  return ac.map(c=>({...c,hours:+(barData.reduce((s,d)=>s+(d[c.label]||0),0)).toFixed(1)}));
}

function renderCards(){
  const ac=categories.filter(c=>c.active);
  const tots=totalsFor(ac);
  const totalH=+tots.reduce((s,c)=>s+c.hours,0).toFixed(1);
  const grid=document.getElementById('cards-grid');
  grid.innerHTML='';

  categories.forEach((cat,i)=>{
    const t=tots.find(t=>t.label===cat.label&&t.hex===cat.hex);
    const hours=t?t.hours:0;
    const pct=totalH>0?((hours/totalH)*100).toFixed(0):0;
    const evs=catEvents[cat.label]||[];
    const card=document.createElement('div');
    card.className='card';
    card.style.cssText=`border-left:3px solid ${cat.hex};opacity:${cat.active?1:0.4};--cat-hex:${cat.hex}`;

    // Build popover HTML
    const evRows=evs.length===0
      ?`<p style="font-size:12px;color:#888;font-style:italic">${rawEvents.length===0?'Load calendar to see events':'No events found'}</p>`
      :evs.slice(0,8).map(ev=>`<div class="ev-row"><div style="display:flex;align-items:center;gap:6px;min-width:0"><div style="width:6px;height:6px;border-radius:50%;background:${cat.hex};flex-shrink:0"></div><span class="ev-name">${ev.name}</span></div><span class="ev-hrs" style="color:${cat.hex}">${ev.hours}h</span></div>`).join('');

    card.innerHTML=`
      <div class="popover" style="border:1px solid ${cat.hex}">
        <p style="font-size:11px;font-weight:700;color:${cat.hex};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${cat.label}</p>
        ${evRows}
        ${hours>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between"><span style="font-size:11px;color:#888">Total</span><span style="font-size:13px;color:#fff;font-weight:700">${hours}h</span></div>`:''}
        <div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:#1c1035;border-right:1px solid ${cat.hex};border-bottom:1px solid ${cat.hex}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="swatch js-swatch" style="background:${cat.hex}"></span>
          <span style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px">color</span>
        </div>
        <div style="display:flex;gap:4px">
          <button class="js-toggle" style="background:none;border:none;cursor:pointer;font-size:13px;color:#666;padding:0">${cat.active?'👁':'🚫'}</button>
          <button class="js-remove" style="background:none;border:none;cursor:pointer;font-size:11px;color:#444;padding:0">✕</button>
        </div>
      </div>
      <p class="js-label" style="font-size:13px;font-weight:600;color:#e0e0e0;cursor:text;padding:2px 4px;border-radius:5px;margin-bottom:6px;display:flex;align-items:center;gap:4px">${cat.label} <span style="font-size:10px;color:#555">✎</span></p>
      <p style="font-size:22px;font-weight:700;color:${cat.hex}">${hours}h</p>
      <p style="font-size:12px;color:#666;margin-top:2px">${pct}% of total</p>
      ${hours>0?`<p style="font-size:10px;color:#444;margin-top:4px">hover to see events</p>`:''}
    `;
    card.querySelector('.js-toggle').onclick=e=>{e.stopPropagation();categories[i].active=!categories[i].active;saveCats();processAndRender();};
    card.querySelector('.js-remove').onclick=e=>{e.stopPropagation();categories.splice(i,1);saveCats();processAndRender();};
    card.querySelector('.js-swatch').onclick=e=>{e.stopPropagation();openPicker(card,i);};
    card.querySelector('.js-label').onclick=e=>{e.stopPropagation();openEditor(card,i);};
    grid.appendChild(card);
  });

  // Add card
  const add=document.createElement('div');
  add.className='card card-add';
  add.innerHTML='<span style="font-size:28px;color:#888">+</span><span style="font-size:12px;color:#666;margin-top:4px">Add Category</span>';
  add.onclick=addCat; grid.appendChild(add);

  // Total card
  const tot=document.createElement('div');
  tot.className='card'; tot.style.borderLeft='3px solid #60a5fa';
  tot.innerHTML=`<p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Total</p><p style="font-size:22px;font-weight:700;color:#60a5fa">${totalH}h</p><p style="font-size:12px;color:#666;margin-top:2px">${ac.length} active</p>`;
  grid.appendChild(tot);
}

function openEditor(card,i){
  const lbl=card.querySelector('.js-label');
  const inp=document.createElement('input');
  inp.value=categories[i].label;
  inp.style.cssText='width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(124,58,237,0.6);border-radius:6px;padding:3px 6px;color:#fff;font-size:13px;font-weight:600;box-sizing:border-box;margin-bottom:6px';
  lbl.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{categories[i].label=inp.value.trim()||categories[i].label;saveCats();processAndRender();};
  inp.onblur=commit;
  inp.onkeydown=e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){inp.value=categories[i].label;commit();}};
}

function openPicker(card,i){
  document.querySelectorAll('.picker-panel').forEach(p=>p.remove());
  const panel=document.createElement('div'); panel.className='picker-panel';
  ALL_COLORS.forEach(col=>{
    const sw=document.createElement('div');
    sw.className='picker-sw'+(col.hex===categories[i].hex?' sel':'');
    sw.style.background=col.hex; sw.title=col.id;
    sw.onclick=e=>{e.stopPropagation();categories[i].hex=col.hex;categories[i].id=col.id;saveCats();document.querySelectorAll('.picker-panel').forEach(p=>p.remove());processAndRender();};
    panel.appendChild(sw);
  });
  card.appendChild(panel);
  const close=e=>{if(!panel.contains(e.target)){panel.remove();document.removeEventListener('click',close);}};
  setTimeout(()=>document.addEventListener('click',close),0);
}

function addCat(){
  const used=new Set(categories.map(c=>c.hex));
  const next=ALL_COLORS.find(c=>!used.has(c.hex));
  if(!next)return;
  categories.push({...next,active:true,label:'New Category'});
  saveCats(); processAndRender();
}

function renderCharts(){
  const ac=categories.filter(c=>c.active);
  const tots=totalsFor(ac);
  const pie=tots.filter(c=>c.hours>0);

  // Donut
  if(donutInst){donutInst.destroy();donutInst=null;}
  donutInst=new Chart(document.getElementById('donut-chart'),{
    type:'doughnut',
    data:{labels:pie.map(c=>c.label),datasets:[{data:pie.map(c=>c.hours),backgroundColor:pie.map(c=>c.hex),borderWidth:0,hoverOffset:4}]},
    options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw}h`}}},animation:{duration:400}}
  });
  document.getElementById('legend').innerHTML=pie.map(c=>`<div style="display:flex;align-items:center;gap:5px;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:${c.hex}"></div><span style="color:#aaa">${c.label}</span></div>`).join('');

  // Bar
  if(barInst){barInst.destroy();barInst=null;}
  barInst=new Chart(document.getElementById('bar-chart'),{
    type:'bar',
    data:{labels:barData.map(d=>d.day),datasets:ac.map(c=>({label:c.label,data:barData.map(d=>d[c.label]||0),backgroundColor:c.hex,stack:'s',borderWidth:0}))},
    options:{plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#888',font:{size:11}}},y:{stacked:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#888',font:{size:11}}}},animation:{duration:400}}
  });
}

function renderTable(){
  const ac=categories.filter(c=>c.active);
  const tots=totalsFor(ac);
  const totalH=+tots.reduce((s,c)=>s+c.hours,0).toFixed(1);
  document.getElementById('tbody').innerHTML=tots.map(c=>{
    const pct=totalH>0?((c.hours/totalH)*100).toFixed(1):0;
    const avg=barData.length>0?(c.hours/barData.length).toFixed(1):0;
    return`<tr><td><div style="width:14px;height:14px;border-radius:4px;background:${c.hex}"></div></td><td style="font-weight:500;color:#e0e0e0">${c.label}</td><td style="color:${c.hex};font-weight:600">${c.hours}h</td><td><div style="display:flex;align-items:center;gap:8px"><div class="bar-chip" style="width:80px"><div class="bar-fill" style="width:${pct}%;background:${c.hex}"></div></div><span style="color:#aaa">${pct}%</span></div></td><td style="color:#888">${avg}h</td></tr>`;
  }).join('');
}

// ── Helpers ────────────────────────────────────────────
function setMode(m){mode=m;updateNav();processAndRender();}
function shiftWeek(dir,reset=false){weekOffset=reset?0:weekOffset+dir;updateNav();processAndRender();}
function setStatus(s){
  const dot=document.getElementById('status-dot'),txt=document.getElementById('status-text');
  if(s==='loading'){dot.style.background='#F6BF26';txt.textContent='Loading...';}
  else if(s==='loaded'){dot.style.background='#33B679';txt.textContent='Live · '+new Date().toLocaleTimeString();}
  else if(s==='error'){dot.style.background='#D50000';txt.textContent='Error';}
}
function showErr(m){const b=document.getElementById('error-banner');b.style.display='block';document.getElementById('error-text').textContent='⚠ '+m;}
function hideErr(){document.getElementById('error-banner').style.display='none';}
function showWarn(m){const b=document.getElementById('warn-banner');b.style.display='block';document.getElementById('warn-text').textContent='📊 '+m;}
function hideWarn(){document.getElementById('warn-banner').style.display='none';}
</script>
